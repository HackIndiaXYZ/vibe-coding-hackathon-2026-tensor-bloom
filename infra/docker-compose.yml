# Cosign — local development stack (ARCHITECTURE §10.1).
# Phase 0 brings up postgres + redis. App services build once their Dockerfiles
# land (Phase 8); `docker compose up postgres redis` works today.
name: cosign

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cosign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-cosign}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cosign} -d ${POSTGRES_DB:-cosign}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [cosign_internal]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [cosign_internal]

  cosign-api:
    build:
      context: ../services/cosign-api
      dockerfile: Dockerfile
    env_file: [./.env]
    ports: ["8080:8080", "50051:50051"]
    volumes:
      # JWT keypair (generated by scripts/gen-keys.sh) mounted read-only.
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/cosign-api", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [cosign_internal]
    profiles: [app]

  cosign-worker:
    build:
      context: ../services/cosign-worker
      dockerfile: Dockerfile
    env_file: [./.env]
    ports: ["8001:8001", "50052:50052"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      cosign-api: { condition: service_started }
    volumes:
      # DockerDriver needs the host docker socket to spawn sandbox containers.
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [cosign_internal]
    profiles: [app]

  cosign-web:
    build:
      context: ../services/cosign-web
      dockerfile: Dockerfile
      args:
        # browser-reachable api URL (inlined into the client bundle at build time)
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports: ["3000:3000"]
    depends_on:
      cosign-api: { condition: service_started }
    networks: [cosign_internal]
    profiles: [app]

  caddy:
    image: caddy:2
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      cosign-web: { condition: service_started }
      cosign-api: { condition: service_started }
    networks: [cosign_internal]
    profiles: [demo]

networks:
  cosign_internal:
    driver: bridge
  # Sandbox containers spawned by the DockerDriver attach to this egress-
  # restricted network. Created here so it exists; the driver enforces the
  # firewall whitelist at container-create time (ARCHITECTURE §6.2).
  cosign_sandbox_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
