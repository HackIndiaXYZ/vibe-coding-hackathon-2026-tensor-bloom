# Per-role / per-tool LLM routing (ARCHITECTURE §5.7).
# DEMO default: every LLM role runs on Anthropic Haiku via the shared operator key
# (ANTHROPIC_API_KEY). Haiku is cheap, which keeps the per-user $0.50 budget viable.
# Users can override any role + bring their own key in /settings (uncapped).
#
# provider: none  -> deterministic local tool, no LLM call.
# provider: mock  -> synthetic response, no API key (dev inner loop / CI).

defaults:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY
  temperature: 0.2
  fallback:
    - { provider: groq, model: llama-3.3-70b-versatile, api_key_env: GROQ_API_KEY }

roles:
  plan_node:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.0

  implementer:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.2

  reviewer:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.2

  critic:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.1

tools:
  diff_analysis:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
  repo_map:
    provider: none
  lint:
    provider: none
  test_runner:
    provider: none
